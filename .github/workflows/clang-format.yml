name: Validate C++ Code Formatting

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:

jobs:
  clang-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Determine changed files
        id: changed-files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA=${{ github.event.pull_request.base.sha }}
            HEAD_SHA=${{ github.event.pull_request.head.sha }}
          else
            BASE_SHA=${{ github.event.before }}
            HEAD_SHA=${{ github.sha }}
          fi

          FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            | grep -E '\.(c|cpp|h|hpp)$' \
            | while read -r f; do [ -f "$f" ] && echo "$f"; done)

          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run clang-format check
        if: steps.changed-files.outputs.files != ''
        run: |
          echo "Checking formatting..."
          FAILED=0

          while IFS= read -r file; do
            echo "Checking $file"
            clang-format --dry-run --Werror "$file" || FAILED=1
          done <<< "${{ steps.changed-files.outputs.files }}"

          if [ $FAILED -ne 0 ]; then
            echo "Formatting issues found. Run clang-format locally."
            exit 1
          fi

      - name: Skip if no relevant files
        if: steps.changed-files.outputs.files == ''
        run: echo "No C/C++ files changed."